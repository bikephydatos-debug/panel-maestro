<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Maestro Bikephilosophy</title>
<style>body{margin:0;background:#111;color:#8DC63F;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column}#msg{font-size:18px;margin-bottom:16px}</style>
</head>
<body>
<div id="msg">Cargando Panel Maestro...</div>
<script>
fetch('panel.html')
  .then(r => r.text())
  .then(html => { document.open(); document.write(html); document.close(); })
  .catch(e => { document.getElementById('msg').textContent = 'Error: ' + e.message; });
</script>
</body>
</html>
